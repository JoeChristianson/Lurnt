name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Build, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build --filter='!@lurnt/qa'

      - name: Type-check
        run: pnpm turbo run type-check --filter='!@lurnt/qa'

      - name: Test
        run: pnpm test
